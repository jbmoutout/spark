name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Check shell syntax
        run: |
          for file in spark.sh spark-precompact.sh spark-stop.sh spark-widgets.sh install.sh; do
            bash -n "$file"
          done

      - name: Check CLI syntax
        run: node --check bin/cli.js

      - name: Shellcheck
        run: shellcheck spark.sh spark-precompact.sh spark-stop.sh spark-widgets.sh install.sh

      - name: Run tests
        run: npm test

      - name: Pack dry run
        run: npm pack --dry-run
